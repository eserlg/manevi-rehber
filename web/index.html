<html>
<head>

    href value below to reflect the base path you are serving from.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Manevi Rehber - Namaz, Kur'an, dua, zikir ve kıble uygulaması.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Manevi Rehber">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Manevi Rehber</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      let compassHandler = null;
      let absoluteCompassSensor = null;
      let speechKeepAliveTimer = null;
      let speechVoices = [];
      let prayerNotificationTimers = [];

      const refreshSpeechVoices = function () {
        if (!('speechSynthesis' in window)) return [];
        speechVoices = window.speechSynthesis.getVoices() || [];
        return speechVoices;
      };

      if ('speechSynthesis' in window) {
        refreshSpeechVoices();
        window.speechSynthesis.onvoiceschanged = refreshSpeechVoices;
      }

      window.ruhHuzurStopSpeech = function () {
        if (speechKeepAliveTimer) {
          clearInterval(speechKeepAliveTimer);
          speechKeepAliveTimer = null;
        }
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
      };

      window.ruhHuzurRequestNotificationPermission = async function () {
        if (!('Notification' in window)) return 'unsupported';
        if (Notification.permission === 'granted') return 'granted';
        if (Notification.permission === 'denied') return 'denied';

        try {
          return await Notification.requestPermission();
        } catch (error) {
          return 'denied';
        }
      };

      window.ruhHuzurClearPrayerNotifications = function () {
        prayerNotificationTimers.forEach(function (timerId) {
          clearTimeout(timerId);
        });
        prayerNotificationTimers = [];
      };

      window.ruhHuzurShowLocalNotification = function (title, body, tag) {
        if (!('Notification' in window) || Notification.permission !== 'granted') {
          return false;
        }

        const options = {
          body: body || '',
          icon: 'icons/Icon-192.png',
          badge: 'icons/Icon-192.png',
          tag: tag || 'manevi-rehber',
          renotify: true,
        };

        if (navigator.serviceWorker?.ready) {
          navigator.serviceWorker.ready
            .then(function (registration) {
              registration.showNotification(title || 'Manevi Rehber', options);
            })
            .catch(function () {
              new Notification(title || 'Manevi Rehber', options);
            });
          return true;
        }

        new Notification(title || 'Manevi Rehber', options);
        return true;
      };

      window.ruhHuzurSchedulePrayerNotifications = function (payloadJson) {
        if (!('Notification' in window) || Notification.permission !== 'granted') {
          return false;
        }

        window.ruhHuzurClearPrayerNotifications();

        let notifications = [];
        try {
          notifications = JSON.parse(payloadJson || '[]');
        } catch (error) {
          return false;
        }

        const maxDelay = 2147483647;
        notifications.forEach(function (item) {
          const notifyAt = new Date(item.notifyAt).getTime();
          const delay = notifyAt - Date.now();
          if (!Number.isFinite(delay) || delay < 0 || delay > maxDelay) return;
          prayerNotificationTimers.push(setTimeout(function () {
            window.ruhHuzurShowLocalNotification(
              item.title || 'Namaz vakti',
              item.body || '',
              item.tag || 'prayer-time'
            );
          }, delay));
        });

        return prayerNotificationTimers.length > 0;
      };

      window.ruhHuzurSpeak = function (text, language, rate) {
        return new Promise(function (resolve, reject) {
          if (!('speechSynthesis' in window)) {
            reject(new Error('speechSynthesis is not supported'));
            return;
          }

          const synth = window.speechSynthesis;
          const voices = refreshSpeechVoices();
          const languagePrefix = language.split('-')[0].toLowerCase();
          const normalizedLanguage = language.toLowerCase();
          const scoreVoice = function (voiceItem) {
            const voiceLang = String(voiceItem.lang || '').toLowerCase().replace('_', '-');
            const voiceName = String(voiceItem.name || '').toLowerCase();
            const searchable = `${voiceName} ${voiceLang}`;
            let score = 0;

            if (voiceLang === normalizedLanguage) {
              score += 100;
            } else if (voiceLang.startsWith(languagePrefix)) {
              score += 70;
            } else {
              return 0;
            }

            [
              'natural',
              'neural',
              'enhanced',
              'premium',
              'online',
              'google',
              'microsoft',
              'apple',
              'siri'
            ].forEach(function (word) {
              if (searchable.includes(word)) score += 10;
            });

            const preferredNames = languagePrefix === 'tr'
              ? ['yelda', 'emel', 'filiz', 'ahmet', 'turkish', 'türk']
              : ['maged', 'majed', 'zeina', 'laila', 'layla', 'hoda', 'naayf', 'tarik', 'salma', 'mariam', 'arabic', 'العربية'];

            preferredNames.forEach(function (word) {
              if (searchable.includes(word)) score += 12;
            });

            ['compact', 'espeak', 'pico', 'robot'].forEach(function (word) {
              if (searchable.includes(word)) score -= 20;
            });

            if (voiceItem.default) score += 3;
            return score;
          };

          const voice = voices
            .map(function (item) {
              return { item: item, score: scoreVoice(item) };
            })
            .filter(function (item) {
              return item.score >= 50;
            })
            .sort(function (a, b) {
              return b.score - a.score;
            })[0]?.item || voices.find(function (item) {
              return item.default;
            });

          const chunks = String(text || '')
            .replace(/\s+/g, ' ')
            .match(/.{1,180}(\s|$)|.{1,180}/g)
            ?.map(function (item) { return item.trim(); })
            .filter(Boolean) || [];

          if (chunks.length === 0) {
            resolve(true);
            return;
          }

          synth.cancel();

          let index = 0;
          let resolved = false;
          const resolveStarted = function () {
            if (resolved) return;
            resolved = true;
            resolve(true);
          };
          const stopKeepAlive = function () {
            if (speechKeepAliveTimer) {
              clearInterval(speechKeepAliveTimer);
              speechKeepAliveTimer = null;
            }
          };
          const speakNext = function () {
            if (index >= chunks.length) {
              stopKeepAlive();
              resolveStarted();
              return;
            }

            const utterance = new SpeechSynthesisUtterance(chunks[index]);
            utterance.lang = voice && voice.lang ? voice.lang : language;
            if (voice) utterance.voice = voice;
            const naturalRate = languagePrefix === 'ar'
              ? Math.max(0.76, Math.min(0.90, rate * 1.9))
              : Math.max(0.84, Math.min(0.98, rate * 1.8));
            utterance.rate = naturalRate;
            utterance.pitch = languagePrefix === 'ar' ? 0.96 : 1.02;
            utterance.volume = 1;
            utterance.onstart = resolveStarted;
            utterance.onend = function () {
              index += 1;
              setTimeout(speakNext, 20);
            };
            utterance.onerror = function (event) {
              stopKeepAlive();
              if (resolved) {
                console.warn('Speech synthesis error', event.error);
              } else {
                reject(new Error(event.error || 'Speech synthesis error'));
              }
            };

            synth.speak(utterance);
            setTimeout(resolveStarted, 80);
          };

          // iOS Safari needs speech to begin inside the tap handler. Do not wait
          // for voiceschanged here; a default voice is better than a blocked one.
          stopKeepAlive();
          speechKeepAliveTimer = setInterval(function () {
            if (synth.speaking || synth.pending) synth.resume();
          }, 1000);
          speakNext();
        });
      };

      window.ruhHuzurRequestOrientationPermission = async function () {
        const isLocal = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
        if (!window.isSecureContext && !isLocal) {
          return 'insecure';
        }

        if (
          typeof DeviceOrientationEvent === 'undefined' &&
          typeof window.AbsoluteOrientationSensor === 'undefined'
        ) {
          return 'unsupported';
        }

        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            let orientationPermission = 'granted';
            try {
              orientationPermission = await DeviceOrientationEvent.requestPermission(true);
            } catch (absoluteError) {
              orientationPermission = await DeviceOrientationEvent.requestPermission();
            }
            if (orientationPermission !== 'granted') return orientationPermission;

            if (
              typeof DeviceMotionEvent !== 'undefined' &&
              typeof DeviceMotionEvent.requestPermission === 'function'
            ) {
              const motionPermission = await DeviceMotionEvent.requestPermission();
              if (motionPermission !== 'granted') return motionPermission;
            }

            return 'granted';
          } catch (error) {
            return 'denied';
          }
        }

        return 'granted';
      };

      window.ruhHuzurStartCompass = function (callback) {
        const isLocal = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
        if (!window.isSecureContext && !isLocal) {
          return false;
        }

        window.ruhHuzurStopCompass();

        const normalize = function (value) {
          return ((value % 360) + 360) % 360;
        };

        const emitHeading = function (heading) {
          if (heading !== null && Number.isFinite(heading)) {
            callback(normalize(heading));
          }
        };

        compassHandler = function (event) {
          let heading = null;

          if (typeof event.webkitCompassHeading === 'number') {
            heading = event.webkitCompassHeading;
          } else if (typeof event.alpha === 'number') {
            const screenAngle = window.screen?.orientation?.angle ??
              window.orientation ??
              0;
            heading = 360 - event.alpha + Number(screenAngle || 0);
          }

          emitHeading(heading);
        };

        window.addEventListener('deviceorientationabsolute', compassHandler, true);
        window.addEventListener('deviceorientation', compassHandler, true);

        if (typeof window.AbsoluteOrientationSensor === 'function') {
          try {
            absoluteCompassSensor = new window.AbsoluteOrientationSensor({
              frequency: 12,
              referenceFrame: 'device',
            });
            absoluteCompassSensor.addEventListener('reading', function () {
              const q = absoluteCompassSensor.quaternion;
              if (!q || q.length < 4) return;

              const x = q[0];
              const y = q[1];
              const z = q[2];
              const w = q[3];
              const yaw = Math.atan2(
                2 * (w * z + x * y),
                1 - 2 * (y * y + z * z)
              ) * 180 / Math.PI;
              emitHeading(360 - yaw);
            });
            absoluteCompassSensor.addEventListener('error', function () {});
            absoluteCompassSensor.start();
          } catch (error) {
            absoluteCompassSensor = null;
          }
        }

        return true;
      };

      window.ruhHuzurStopCompass = function () {
        if (compassHandler) {
          window.removeEventListener('deviceorientationabsolute', compassHandler, true);
          window.removeEventListener('deviceorientation', compassHandler, true);
          compassHandler = null;
        }

        if (absoluteCompassSensor) {
          try {
            absoluteCompassSensor.stop();
          } catch (error) {}
          absoluteCompassSensor = null;
        }
      };
    })();
  </script>

</body>
</html>
