<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="42%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#DDEED2"/>
      <stop offset="58%" stop-color="#A8D5BA"/>
      <stop offset="100%" stop-color="#86B79A"/>
    </radialGradient>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1E8D2"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF8F0"/>
      <stop offset="100%" stop-color="#E9DEC2"/>
    </linearGradient>
    <radialGradient id="shade" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0f3a2a" stop-opacity="0.12"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Soft ground shadow -->
  <ellipse cx="512" cy="780" rx="320" ry="46" fill="#0f3a2a" opacity="0.14" filter="url(#soft)"/>

  <!-- Side minarets (slim) -->
  <g fill="url(#wall)" stroke="#C9BC93" stroke-width="6">
    <rect x="208" y="392" width="64" height="360" rx="30"/>
    <rect x="752" y="392" width="64" height="360" rx="30"/>
  </g>
  <g fill="#C9BC93">
    <circle cx="240" cy="372" r="22"/>
    <circle cx="784" cy="372" r="22"/>
  </g>

  <!-- Wall / base -->
  <rect x="300" y="486" width="424" height="266" rx="56" fill="url(#wall)" stroke="#C9BC93" stroke-width="6"/>

  <!-- Dome -->
  <path d="M300 486 H724 V520
           C724 372, 624 312, 512 312
           C400 312, 300 372, 300 520 Z"
        fill="url(#dome)" stroke="#C9BC93" stroke-width="6"/>
  <!-- Dome shading overlay -->
  <path d="M300 486 H724 V520
           C724 372, 624 312, 512 312
           C400 312, 300 372, 300 520 Z"
        fill="url(#shade)"/>

  <!-- Finial -->
  <rect x="500" y="276" width="24" height="42" rx="6" fill="#C9BC93"/>

  <!-- Crescent accent (gold) above dome -->
  <g transform="translate(600 220)">
    <circle cx="0" cy="0" r="58" fill="#D9B575"/>
    <circle cx="22" cy="-8" r="46" fill="#A8D5BA"/>
  </g>

  <!-- Arched doorway -->
  <path d="M476 752 V608
           C476 566, 548 566, 548 608
           V752 Z"
        fill="#5A9A7F"/>

  <!-- Two small arched windows -->
  <g fill="#5A9A7F">
    <path d="M366 720 V644 C366 620, 410 620, 410 644 V720 Z"/>
    <path d="M614 720 V644 C614 620, 658 620, 658 644 V720 Z"/>
  </g>

  <!-- Subtle outer frame (maskable safe area guidance) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"
        fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.18"/>
</svg>